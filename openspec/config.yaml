schema: spec-driven

context: |
  Project: slynk-client / cli-client
  Language: Janet-lang
  Purpose: CLI tool for AI agents to evaluate Common Lisp forms against a running Slynk server
  Command name: slyc
  Protocol: Slynk wire protocol (TCP, length-prefixed s-expressions)
  Startup: Must be fast (cold-start per invocation, ~ms)
  Platform: Linux first, cross-platform later
  Output: Clean text for AI agent consumption (stdout=result, stderr=infra errors, exit codes)
  Repository: /home/gal/code/slynk-client/cli-client

rules:
  design:
    - Reference exact wire protocol functions/messages from slynk-rpc.lisp
    - Include ASCII protocol diagrams
    - Cover auth, timeout, error handling, exit codes
